# 默认配置 —— 后续步骤逐步填充

# ViT encoder (Sec. II)
model:
  name: vit_base_patch16_224   # timm 预训练模型
  pretrained: true
  image_size: 224
  patch_size: 16

# 数据集
data:
  name: cifar100
  root: ./data
  batch_size: 64

# 量化与比特分配 (Sec. III)
quantization:
  m_max: 8            # 单 patch 最大量化比特 M_max
  b_target: null      # 总比特预算 Btarget (null = 后续按开销扫描)
  weight: attention   # 权重 w(a_i): 注意力分数的递增函数

# 信道 (Sec. IV)
channel:
  enabled: false      # Step 6 开启
  bsc_flip_prob: 0.0  # BSC 翻转概率 mu

seed: 0
device: cuda
