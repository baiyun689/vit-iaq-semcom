# 默认配置 —— 后续步骤逐步填充

# ViT encoder (Sec. II)
model:
  # 论文设置：device 端 encoder = DeiT-Tiny，server 端 = DeiT-Small（ImageNet-1k 预训练→按数据集微调）。
  # 注意力提取依赖此结构；DeiT-Tiny: 192 维 / 3 头 / patch16 / 14×14=196 patch。
  arch: deit_tiny_patch16_224
  num_classes: 100
  image_size: 224
  patch_size: 16
  # device 端 / server 端 encoder 的权重来源（论文图 1）。
  # 取值：
  #   random     -> 随机初始化（仅测试用，不下载）
  #   imagenet   -> timm 默认 ImageNet 预训练
  #   hf:<repo>  -> 从 HF repo 手动加载 pytorch_model.bin
  # 方案 B（当前）：直接用 ImageNet 预训练 DeiT-Tiny 出注意力对比图，验证骨干+协议对齐。
  # 方案 A（后续）：在 CIFAR-100 上微调 DeiT-Tiny/-Small 复刻论文 setup。
  device_weights: imagenet
  # change iaq-baseline-channel-cliff（提速）：IAQ 链路用一个 CIFAR-100 微调过的
  # ViT-Base 同时算注意力 + 分类（纯推理、不训练）。device/server 骨干不对称是
  # 正统设定（后续 change 再切 DeiT-Tiny/-Small）。server_arch 缺省回退 arch。
  server_arch: vit_base_patch16_224
  server_weights: hf:edadaltocg/vit_base_patch16_224_in21k_ft_cifar100

# 数据集
data:
  name: cifar100
  root: ./data
  batch_size: 64

# 量化与比特分配 (Sec. III)
quantization:
  m_max: 8            # 单 patch 最大量化比特 M_max
  b_target: 980       # 总比特预算 Btarget（对 sum M_i 的约束；196 patch 均值≈5bit，有效压缩）
  weight: attention   # 权重 w(a_i): 注意力分数的递增函数
  alloc: incremental  # 比特分配策略：incremental | uniform（同码率基线）| water_filling（后续）

# 信道 (Sec. IV)
channel:
  type: awgn                  # awgn（数字过高斯信道，用 ebn0_db）| bsc（抽象翻转，用 bsc_flip_prob）
  enabled: false              # 关：干净信道（基线）。开：施加信道误码
  ebn0_db: 6.0                # AWGN 的 Eb/N0(dB)；未编码 BPSK 下 BER=Q(√(2·Eb/N0))
  bsc_flip_prob: 0.0          # BSC 翻转概率 mu（type=bsc 时用）
  metadata_through_channel: false  # 关=元信息无损（论文假设）；开=元信息也过信道

seed: 0
device: cuda
